services:
  nginx:
    image: nginx:1.27-alpine
    container_name: smart_buy_list_proxy
    depends_on:
      - frontend
      - backend
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro

  mysql:
    image: mysql:8.0
    container_name: smart_buy_list_mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  backend:
    build:
      context: ./back-end
    container_name: smart_buy_list_backend
    environment:
      NODE_ENV: ${NODE_ENV}
      PORT: ${PORT}
      DATABASE_URL: ${DATABASE_URL}
    depends_on:
      - mysql

  frontend:
    build:
      context: ./front-end
      args:
        VITE_API_URL: ${VITE_API_URL}
    container_name: smart_buy_list_frontend
    depends_on:
      - backend

volumes:
  mysql_data:
